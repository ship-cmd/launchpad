swagger: '2.0'
info:
  title: Engineer Training API
  description: API Gateway routing to multiple Cloud Functions
  version: 1.0.0
schemes:
  - https
produces:
  - application/json
paths:
  /python:
    get:
      summary: Route to Python Function
      operationId: hello_python
      x-google-backend:
        address: REPLACE_WITH_PYTHON_FUNCTION_URL
      security:
        - api_key: []
      responses:
        '200':
          description: A successful response
  /node:
    get:
      summary: Route to Node.js Function
      operationId: hello_node
      x-google-backend:
        address: REPLACE_WITH_NODE_FUNCTION_URL
      security:
        - api_key: []
      responses:
        '200':
          description: A successful response
securityDefinitions:
  api_key:
    type: apiKey
    name: key
    in: query
